<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f7;
           min-height: 100vh; display: flex; align-items: center;
           justify-content: center; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 1.75rem;
            width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .sub { color: #777; font-size: 0.85rem; margin-bottom: 1.5rem; }

    .photo-grid { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .upload-zone { flex: 1; border: 2.5px dashed #c7d2e0; border-radius: 12px;
                   padding: 0.75rem 0.25rem; text-align: center; cursor: pointer;
                   position: relative; transition: border-color 0.2s, background 0.2s; }
    .upload-zone:hover { border-color: #4f46e5; background: #f5f3ff; }
    .upload-zone.done { border-color: #4ade80; background: #f0fdf4; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0;
                         cursor: pointer; width: 100%; height: 100%; }
    .upload-zone .icon { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .upload-zone .label { font-size: 0.7rem; font-weight: 600; color: #444;
                          margin-bottom: 0.15rem; }
    .upload-zone .hint { font-size: 0.65rem; color: #888; }

    .previews { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .previews img { display: none; flex: 1; max-height: 120px; object-fit: contain;
                    border-radius: 8px; border: 2px solid #e2e8f0; }

    label { display: block; font-size: 0.8rem; font-weight: 600;
            color: #555; margin-bottom: 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.55rem 0.7rem;
                         border: 1.5px solid #e2e8f0; border-radius: 8px;
                         font-size: 0.9rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #4f46e5; }

    button.primary { width: 100%; padding: 0.85rem; background: #4f46e5; color: white;
                     border: none; border-radius: 10px; font-size: 1rem;
                     font-weight: 600; cursor: pointer; }
    button.primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    button.secondary { width: 100%; padding: 0.65rem; background: white; color: #4f46e5;
                       border: 1.5px solid #4f46e5; border-radius: 10px; font-size: 0.9rem;
                       font-weight: 600; cursor: pointer; margin-top: 0.5rem; display: none; }

    .steps { margin-top: 1rem; font-size: 0.82rem; color: #555; text-align: center; }
    .step { padding: 0.2rem 0; opacity: 0.35; transition: opacity 0.3s; }
    .step.active { opacity: 1; font-weight: 600; color: #4f46e5; }
    .step.done { opacity: 0.6; }
    .spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid #ddd;
               border-top-color: #4f46e5; border-radius: 50%;
               animation: spin 0.7s linear infinite; margin-right: 4px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box { display: none; margin-top: 1rem; background: #fff1f2;
                 border: 1.5px solid #fecdd3; border-radius: 8px;
                 padding: 0.6rem 0.75rem; font-size: 0.82rem; color: #9f1239; }
  </style>
</head>
<body>
<div class="card">
  <h1>📚 Library Book Scanner</h1>
  <p class="sub">Take three photos of the book, then enter the accession number.</p>

  <div class="photo-grid">
    <div class="upload-zone" id="zone-front">
      <input type="file" id="photo-front" accept="image/*" capture="environment">
      <div class="icon">📖</div>
      <div class="label">Front</div>
      <div class="hint">Cover</div>
    </div>
    <div class="upload-zone" id="zone-back">
      <input type="file" id="photo-back" accept="image/*" capture="environment">
      <div class="icon">📄</div>
      <div class="label">Back</div>
      <div class="hint">Cover</div>
    </div>
    <div class="upload-zone" id="zone-isbn">
      <input type="file" id="photo-isbn" accept="image/*" capture="environment">
      <div class="icon">🔢</div>
      <div class="label">ISBN</div>
      <div class="hint">Close-up</div>
    </div>
  </div>

  <div class="previews">
    <img id="preview-front" alt="Front">
    <img id="preview-back"  alt="Back">
    <img id="preview-isbn"  alt="ISBN">
  </div>

  <label>Accession No. *</label>
  <input type="text" id="accession" placeholder="e.g. LIB-0042">

  <button class="primary" id="submitBtn" onclick="submitBook()" disabled>
    📥 Submit Book
  </button>
  <button class="secondary" id="retryBtn" onclick="retry()">🔄 Retry</button>

  <div class="steps" id="steps" style="display:none">
    <div class="step" id="step1">📷 Compressing images...</div>
    <div class="step" id="step2">🤖 Gemini analysing book...</div>
    <div class="step" id="step3">📊 Saving to sheet...</div>
  </div>

  <div id="error-box"></div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzk__oqXukl9vEB7EEov6uwuzHligIanPtD0-vLK1oTB9TYaMGNINQC44Z3hEOBjG4/exec';

  const images = { front: null, back: null, isbn: null };

  // front/back: 1200px wide, quality 0.82 — large text survives fine
  // isbn: 1600px wide, quality 0.92 — preserve small digit clarity
  const config = {
    front: { maxPx: 1200, quality: 0.82 },
    back:  { maxPx: 1200, quality: 0.82 },
    isbn:  { maxPx: 1600, quality: 0.92 }
  };

  function setupUpload(key) {
    document.getElementById('photo-' + key).addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      compressImage(file, config[key].maxPx, config[key].quality).then(b64 => {
        images[key] = b64;
        // show preview (use original for display)
        const reader = new FileReader();
        reader.onload = ev => {
          const img = document.getElementById('preview-' + key);
          img.src = ev.target.result;
          img.style.display = 'block';
        };
        reader.readAsDataURL(file);
        document.getElementById('zone-' + key).classList.add('done');
        updateSubmitBtn();
      });
    });
  }

  ['front', 'back', 'isbn'].forEach(setupUpload);

  function compressImage(file, maxPx, quality) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
      };
      img.src = url;
    });
  }

  function updateSubmitBtn() {
    const any = images.front || images.back || images.isbn;
    document.getElementById('submitBtn').disabled = !any;
  }

  function setStep(n) {
    [1, 2, 3].forEach(i => {
      const el = document.getElementById('step' + i);
      el.classList.remove('active', 'done');
      if (i < n)  el.classList.add('done');
      if (i === n) el.classList.add('active');
    });
  }

  async function submitBook() {
    const accession = document.getElementById('accession').value.trim();
    if (!accession) { showError('Please enter Accession No.'); return; }

    const imageList = [images.front, images.back, images.isbn].filter(Boolean);

    document.getElementById('submitBtn').disabled = true;
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('steps').style.display = 'block';
    setStep(1);

    await new Promise(r => setTimeout(r, 400)); // let UI update
    setStep(2);

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ images: imageList, accessionNo: accession }),
        headers: { 'Content-Type': 'text/plain' }
      });

      setStep(3);
      const result = await res.json();
      if (!result.success) throw new Error(result.error);

      document.getElementById('steps').style.display = 'none';
      showSuccess('✅ "' + result.title + '" saved!');
      setTimeout(resetForm, 2500);
    } catch (err) {
      document.getElementById('steps').style.display = 'none';
      showError(err.message);
      document.getElementById('retryBtn').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;
    }
  }

  function retry() {
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    submitBook();
  }

  function resetForm() {
    images.front = null; images.back = null; images.isbn = null;
    ['front', 'back', 'isbn'].forEach(k => {
      document.getElementById('photo-' + k).value = '';
      document.getElementById('preview-' + k).style.display = 'none';
      document.getElementById('zone-' + k).classList.remove('done');
    });
    document.getElementById('accession').value = '';
    document.getElementById('error-box').style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
    document.getElementById('steps').style.display = 'none';
    document.getElementById('submitBtn').disabled = true;
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
  }

  function showSuccess(msg) {
    const el = document.getElementById('error-box');
    el.style.background = '#f0fdf4';
    el.style.borderColor = '#bbf7d0';
    el.style.color = '#065f46';
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
