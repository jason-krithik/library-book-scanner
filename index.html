<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f7;
           min-height: 100vh; display: flex; align-items: center;
           justify-content: center; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 1.75rem;
            width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .sub { color: #777; font-size: 0.85rem; margin-bottom: 1.5rem; }

    .photo-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .upload-zone { flex: 1; border: 2.5px dashed #c7d2e0; border-radius: 12px;
                   padding: 1rem 0.5rem; text-align: center; cursor: pointer;
                   position: relative; transition: border-color 0.2s, background 0.2s; }
    .upload-zone:hover { border-color: #4f46e5; background: #f5f3ff; }
    .upload-zone.done { border-color: #4f46e5; background: #f5f3ff; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0;
                         cursor: pointer; width: 100%; height: 100%; }
    .upload-zone .icon { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .upload-zone p { font-size: 0.75rem; color: #555; }

    .previews { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .previews img { display: none; flex: 1; max-height: 140px; object-fit: contain;
                    border-radius: 10px; border: 2px solid #e2e8f0; }

    label { display: block; font-size: 0.8rem; font-weight: 600;
            color: #555; margin-bottom: 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.55rem 0.7rem;
                         border: 1.5px solid #e2e8f0; border-radius: 8px;
                         font-size: 0.9rem; margin-bottom: 1rem; }
    input:focus { outline: none; border-color: #4f46e5; }

    button.primary { width: 100%; padding: 0.85rem; background: #4f46e5; color: white;
                     border: none; border-radius: 10px; font-size: 1rem;
                     font-weight: 600; cursor: pointer; }
    button.primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    #status { margin-top: 1rem; font-size: 0.88rem; text-align: center; color: #555; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ddd;
               border-top-color: #4f46e5; border-radius: 50%;
               animation: spin 0.7s linear infinite; margin-right: 5px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>📚 Library Book Scanner</h1>
  <p class="sub">Photo the front and back cover, enter accession no., then submit.</p>

  <div class="photo-row">
    <div class="upload-zone" id="zone-front">
      <input type="file" id="photo-front" accept="image/*" capture="environment">
      <div class="icon">📷</div>
      <p id="text-front">Front cover</p>
    </div>
    <div class="upload-zone" id="zone-back">
      <input type="file" id="photo-back" accept="image/*" capture="environment">
      <div class="icon">📷</div>
      <p id="text-back">Back cover</p>
    </div>
  </div>

  <div class="previews">
    <img id="preview-front" alt="Front">
    <img id="preview-back" alt="Back">
  </div>

  <label>Accession No. *</label>
  <input type="text" id="accession" placeholder="e.g. LIB-0042">

  <button class="primary" id="submitBtn" onclick="submitBook()" disabled>
    📥 Submit Book
  </button>
  <div id="status"></div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzk__oqXukl9vEB7EEov6uwuzHligIanPtD0-vLK1oTB9TYaMGNINQC44Z3hEOBjG4/exec';

  const images = { front: null, back: null };

  function setupUpload(inputId, previewId, zoneId, textId, key) {
    document.getElementById(inputId).addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        images[key] = ev.target.result.split(',')[1];
        document.getElementById(previewId).src = ev.target.result;
        document.getElementById(previewId).style.display = 'block';
        document.getElementById(zoneId).classList.add('done');
        document.getElementById(textId).textContent = '✅ Done';
        updateSubmitBtn();
      };
      reader.readAsDataURL(file);
    });
  }

  setupUpload('photo-front', 'preview-front', 'zone-front', 'text-front', 'front');
  setupUpload('photo-back',  'preview-back',  'zone-back',  'text-back',  'back');

  function updateSubmitBtn() {
    // At least one image required
    document.getElementById('submitBtn').disabled = !images.front && !images.back;
  }

  async function submitBook() {
    const accession = document.getElementById('accession').value.trim();
    if (!accession) { setStatus('⚠️ Please enter Accession No.'); return; }

    const imageList = [images.front, images.back].filter(Boolean);

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    setStatus('<span class="spinner"></span> Scanning with Gemini & saving...');

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ images: imageList, accessionNo: accession }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const result = await res.json();
      if (!result.success) throw new Error(result.error);
      setStatus('✅ "' + result.title + '" saved!');
      setTimeout(resetForm, 2000);
    } catch (err) {
      setStatus('❌ Error: ' + err.message);
      btn.disabled = false;
    }
  }

  function resetForm() {
    images.front = null;
    images.back = null;
    ['front', 'back'].forEach(k => {
      document.getElementById('photo-' + k).value = '';
      document.getElementById('preview-' + k).style.display = 'none';
      document.getElementById('zone-' + k).classList.remove('done');
    });
    document.getElementById('text-front').textContent = 'Front cover';
    document.getElementById('text-back').textContent = 'Back cover';
    document.getElementById('accession').value = '';
    document.getElementById('status').innerHTML = '';
    document.getElementById('submitBtn').disabled = true;
  }

  function setStatus(html) { document.getElementById('status').innerHTML = html; }
</script>
</body>
</html>
