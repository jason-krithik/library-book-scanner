<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Book Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; overflow: hidden; }
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f7;
           position: fixed; width: 100%; height: 100%;
           overflow: hidden; overscroll-behavior: none;
           display: flex; align-items: center;
           justify-content: center; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 1.75rem;
            width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .sub { color: #777; font-size: 0.85rem; margin-bottom: 1.5rem; }

    .photo-grid { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .upload-zone { flex: 1; border: 2.5px dashed #c7d2e0; border-radius: 12px;
                   padding: 0.75rem 0.25rem; text-align: center; cursor: pointer;
                   position: relative; transition: border-color 0.2s, background 0.2s; }
    .upload-zone:hover { border-color: #4f46e5; background: #f5f3ff; }
    .upload-zone.done { border-color: #4ade80; background: #f0fdf4; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0;
                         cursor: pointer; width: 100%; height: 100%; }
    .upload-zone .icon { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .upload-zone .label { font-size: 0.7rem; font-weight: 600; color: #444; margin-bottom: 0.15rem; }
    .upload-zone .hint { font-size: 0.65rem; color: #888; }

    .previews { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .previews img { display: none; flex: 1; max-height: 120px; object-fit: contain;
                    border-radius: 8px; border: 2px solid #e2e8f0; }

    label { display: block; font-size: 0.8rem; font-weight: 600;
            color: #555; margin-bottom: 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.55rem 0.7rem;
                         border: 1.5px solid #e2e8f0; border-radius: 8px;
                         font-size: 1rem; margin-bottom: 0.25rem; }
    input:focus { outline: none; border-color: #4f46e5; }
    input.input-error { border-color: #f43f5e; }
    .field-error { font-size: 0.75rem; color: #e11d48; margin-bottom: 0.75rem;
                   min-height: 1rem; display: block; }

    button.primary { width: 100%; padding: 0.85rem; background: #4f46e5; color: white;
                     border: none; border-radius: 10px; font-size: 1rem;
                     font-weight: 600; cursor: pointer; }
    button.primary:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* Status pill */
    #status-pill { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
                   width: calc(100% - 2rem); max-width: 420px; z-index: 999;
                   background: #1e293b; color: white; border-radius: 14px;
                   padding: 0.65rem 1rem; display: none; align-items: center;
                   gap: 0.6rem; box-shadow: 0 4px 20px rgba(0,0,0,0.25);
                   cursor: pointer; user-select: none;
                   transition: background 0.25s; }
    #status-pill.has-failure { background: #be123c; }
    #status-pill.all-done    { background: #065f46; }
    .pill-counts { display: flex; gap: 0.75rem; flex: 1; font-size: 0.82rem; font-weight: 500; }
    .pill-counts span { display: flex; align-items: center; gap: 0.3rem; }
    .pill-spinner { width: 11px; height: 11px; border: 2px solid rgba(255,255,255,0.35);
                    border-top-color: white; border-radius: 50%;
                    animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .pill-chevron { font-size: 0.75rem; opacity: 0.7; transition: transform 0.2s; }
    .pill-chevron.open { transform: rotate(180deg); }
    .pill-dismiss { font-size: 1rem; opacity: 0.6; line-height: 1; padding: 0.15rem 0.2rem;
                    background: none; border: none; color: white; cursor: pointer;
                    flex-shrink: 0; margin-left: 0.25rem; }
    .pill-dismiss:hover { opacity: 1; }

    /* Drawer */
    #status-drawer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
                     width: 100%; max-width: 420px; z-index: 998;
                     background: white; border-radius: 20px 20px 0 0;
                     box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
                     height: 50vh; display: flex; flex-direction: column;
                     transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
                     transform: translateX(-50%) translateY(100%); }
    #status-drawer.open { transform: translateX(-50%) translateY(0); }
    .drawer-handle { width: 36px; height: 4px; background: #e2e8f0;
                     border-radius: 2px; margin: 0.65rem auto 0.5rem; flex-shrink: 0; }
    .drawer-title  { font-size: 0.8rem; font-weight: 700; color: #64748b;
                     text-transform: uppercase; letter-spacing: 0.05em;
                     padding: 0 1rem 0.5rem; flex-shrink: 0; }
    .drawer-list   { overflow-y: auto; padding: 0 1rem 1.5rem; display: flex;
                     flex-direction: column; gap: 0.5rem; }
    .drawer-row    { display: flex; align-items: center; gap: 0.6rem;
                     padding: 0.55rem 0.75rem; border-radius: 10px;
                     background: #f8fafc; font-size: 0.82rem; }
    .drawer-row.processing { color: #334155; }
    .drawer-row.done       { color: #065f46; background: #f0fdf4; }
    .drawer-row.failed     { color: #9f1239; background: #fff1f2; }
    .drawer-row .row-label { flex: 1; min-width: 0; overflow: hidden;
                             text-overflow: ellipsis; white-space: nowrap; }
    .drawer-row .row-acc   { font-weight: 700; flex-shrink: 0; }
    .retry-btn { background: #e11d48; color: white; border: none; border-radius: 6px;
                 padding: 0.35rem 0.65rem; font-size: 0.72rem; font-weight: 600;
                 cursor: pointer; flex-shrink: 0; white-space: nowrap;
                 min-height: 32px; line-height: 1; }
    .retry-btn:active { opacity: 0.75; }
    @keyframes highlight-field {
      0%, 100% { border-color: #e2e8f0; box-shadow: none; }
      50%       { border-color: #f43f5e; box-shadow: 0 0 0 3px rgba(244,63,94,0.15); }
    }
    .field-highlight { animation: highlight-field 0.7s ease 2; }
    #drawer-overlay { position: fixed; inset: 0; z-index: 997; display: none; }
    #drawer-overlay.open { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Library selection screen */
    #library-screen { display: flex; align-items: center; justify-content: center;
                      min-height: 100vh; padding: 1rem; }
    .lib-card { background: white; border-radius: 16px; padding: 2rem 1.75rem;
                width: 100%; max-width: 420px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; }
    .lib-card h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .lib-card p  { color: #777; font-size: 0.85rem; margin-bottom: 1.75rem; }
    .lib-btn { display: block; width: 100%; padding: 1rem;
               border: 2px solid #4f46e5; border-radius: 12px;
               background: white; color: #4f46e5;
               font-size: 1rem; font-weight: 700; cursor: pointer;
               margin-bottom: 0.75rem; }
    .lib-btn:hover { background: #4f46e5; color: white; }

    /* Ready confirmation */
    #ready-msg { font-size: 0.8rem; color: #059669; font-weight: 600;
                 text-align: center; margin-bottom: 0.75rem; min-height: 1.1rem;
                 opacity: 0; transition: opacity 0.3s; }
    #ready-msg.show { opacity: 1; }

    /* Library badge on scanner */
    #lib-badge { font-size: 0.75rem; color: #6366f1; margin-bottom: 1.25rem;
                 display: flex; align-items: center; gap: 0.4rem; }
    #lib-badge button { background: none; border: none; color: #6366f1;
                        cursor: pointer; font-size: 0.75rem;
                        text-decoration: underline; padding: 0; }
  </style>
</head>
<body>
<div id="library-screen" style="display:none">
  <div class="lib-card">
    <h2>📚 Which library?</h2>
    <p>Choose the library you are scanning for. This will be remembered on this device.</p>
    <button class="lib-btn" onclick="selectLibrary('senior')">Senior Library</button>
    <button class="lib-btn" onclick="selectLibrary('junior')">Junior Library</button>
  </div>
</div>

<div class="card" id="scanner-card" style="display:none">
  <h1>📚 Library Book Scanner</h1>
  <p class="sub">Photo front, back, and ISBN close-up — then submit and move on.</p>

  <div id="ready-msg">✓ Ready for next book</div>

  <div id="lib-badge">
    <span id="lib-badge-text"></span>
    <button onclick="changeLibrary()">change</button>
  </div>

  <div class="photo-grid">
    <div class="upload-zone" id="zone-front">
      <input type="file" id="photo-front" accept="image/*" capture="environment">
      <div class="icon">📖</div>
      <div class="label">Front</div>
      <div class="hint">Cover</div>
    </div>
    <div class="upload-zone" id="zone-back">
      <input type="file" id="photo-back" accept="image/*" capture="environment">
      <div class="icon">📄</div>
      <div class="label">Back</div>
      <div class="hint">Cover</div>
    </div>
    <div class="upload-zone" id="zone-isbn">
      <input type="file" id="photo-isbn" accept="image/*" capture="environment">
      <div class="icon">🔢</div>
      <div class="label">ISBN</div>
      <div class="hint">Barcode</div>
    </div>
  </div>

  <div class="previews">
    <img id="preview-front" alt="Front">
    <img id="preview-back"  alt="Back">
    <img id="preview-isbn"  alt="ISBN">
  </div>

  <label>Accession No. *</label>
  <input type="text" id="accession" placeholder="e.g. LIB-0042" inputmode="text" autocomplete="off">
  <span class="field-error" id="accession-error"></span>

  <button class="primary" id="submitBtn" onclick="submitBook()" disabled>
    📥 Submit Book
  </button>
</div>

<div id="drawer-overlay" onclick="StatusTracker.closeDrawer()"></div>

<div id="status-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Submission Queue</div>
  <div class="drawer-list" id="drawer-list"></div>
</div>

<div id="status-pill" onclick="StatusTracker.toggleDrawer()">
  <div class="pill-counts">
    <span id="pill-processing" style="display:none">
      <div class="pill-spinner"></div><span id="pill-processing-count"></span> processing
    </span>
    <span id="pill-done" style="display:none">
      ✓ <span id="pill-done-count"></span> done
    </span>
    <span id="pill-failed" style="display:none">
      ✕ <span id="pill-failed-count"></span> failed
    </span>
  </div>
  <span class="pill-chevron" id="pill-chevron">▲</span>
  <button class="pill-dismiss" id="pill-dismiss" aria-label="Dismiss" onclick="StatusTracker.dismiss(event)">×</button>
</div>

<script>
  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = name + '=' + value + '; expires=' + expires + '; path=/';
  }
  function getCookie(name) {
    return document.cookie.split('; ').reduce((r, c) => {
      const [k, v] = c.split('=');
      return k === name ? v : r;
    }, null);
  }

  function initLibraryScreen() {
    const lib = getCookie('libraryType');
    if (lib) {
      showScanner(lib);
    } else {
      document.getElementById('library-screen').style.display = 'flex';
    }
  }

  function selectLibrary(type) {
    setCookie('libraryType', type, 365);
    document.getElementById('library-screen').style.display = 'none';
    showScanner(type);
  }

  function showScanner(type) {
    const label = type === 'junior' ? 'Junior Library' : 'Senior Library';
    document.getElementById('lib-badge-text').textContent = label;
    document.getElementById('scanner-card').style.display = 'block';
  }

  function changeLibrary() {
    document.cookie = 'libraryType=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
    location.reload();
  }

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzk__oqXukl9vEB7EEov6uwuzHligIanPtD0-vLK1oTB9TYaMGNINQC44Z3hEOBjG4/exec';

  const images = { front: null, back: null, isbn: null };
  const compressionConfig = {
    front: { maxPx: 1200, quality: 0.82 },
    back:  { maxPx: 1200, quality: 0.82 },
    isbn:  { maxPx: 1600, quality: 0.92 }
  };

  ['front', 'back', 'isbn'].forEach(key => {
    document.getElementById('photo-' + key).addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const { maxPx, quality } = compressionConfig[key];
      compressImage(file, maxPx, quality).then(b64 => {
        images[key] = b64;
        const reader = new FileReader();
        reader.onload = ev => {
          const img = document.getElementById('preview-' + key);
          img.src = ev.target.result;
          img.style.display = 'block';
        };
        reader.readAsDataURL(file);
        document.getElementById('zone-' + key).classList.add('done');
        updateSubmitBtn();
      });
    });
  });

  function compressImage(file, maxPx, quality) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
      };
      img.src = url;
    });
  }

  function updateSubmitBtn() {
    document.getElementById('submitBtn').disabled =
      !images.front && !images.back && !images.isbn;
  }

  function submitBook() {
    const accInput = document.getElementById('accession');
    const accession = accInput.value.trim();
    if (!accession) {
      accInput.classList.add('input-error');
      document.getElementById('accession-error').textContent = 'Accession No. is required';
      accInput.focus();
      return;
    }

    const imageList = [images.front, images.back, images.isbn].filter(Boolean);

    // Reset immediately — user can start next book
    resetForm();

    // Track in status pill
    StatusTracker.add(accession);

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ images: imageList, accessionNo: accession, library: getCookie('libraryType') || 'senior' }),
      headers: { 'Content-Type': 'text/plain' }
    })
    .then(res => res.json())
    .then(result => {
      if (!result.success) throw new Error(result.error);
      StatusTracker.done(accession, result.title || 'Saved');
    })
    .catch(err => {
      StatusTracker.fail(accession, err.message);
    });
  }

  function resetForm() {
    images.front = null; images.back = null; images.isbn = null;
    ['front', 'back', 'isbn'].forEach(k => {
      document.getElementById('photo-' + k).value = '';
      document.getElementById('preview-' + k).style.display = 'none';
      document.getElementById('zone-' + k).classList.remove('done');
    });
    document.getElementById('accession').value = '';
    document.getElementById('accession-error').textContent = '';
    document.getElementById('submitBtn').disabled = true;

    const msg = document.getElementById('ready-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
  }

  const StatusTracker = (() => {
    // Map of accession -> { state: 'processing'|'done'|'failed', label: string }
    const books = new Map();

    function counts() {
      let processing = 0, done = 0, failed = 0;
      for (const b of books.values()) {
        if (b.state === 'processing') processing++;
        else if (b.state === 'done') done++;
        else if (b.state === 'failed') failed++;
      }
      return { processing, done, failed };
    }

    function render() {
      const { processing, done, failed } = counts();
      const pill = document.getElementById('status-pill');

      // Update count spans
      const showHide = (id, countId, n) => {
        document.getElementById(id).style.display = n ? '' : 'none';
        if (countId) document.getElementById(countId).textContent = n;
      };
      showHide('pill-processing', 'pill-processing-count', processing);
      showHide('pill-done',       'pill-done-count',       done);
      showHide('pill-failed',     'pill-failed-count',     failed);

      // Pill colour
      pill.classList.toggle('has-failure', failed > 0 && processing === 0);
      pill.classList.toggle('all-done',    failed === 0 && processing === 0 && done > 0);

      // Show pill only if drawer is not open
      const drawerOpen = document.getElementById('status-drawer').classList.contains('open');
      if (!drawerOpen) pill.style.display = 'flex';

      renderDrawer();
    }

    function renderDrawer() {
      const list = document.getElementById('drawer-list');
      list.innerHTML = '';
      // Show most recent first
      const entries = [...books.entries()].reverse();
      for (const [acc, b] of entries) {
        const row = document.createElement('div');
        row.className = 'drawer-row ' + b.state;
        const icon = b.state === 'processing' ? '<div class="pill-spinner"></div>'
                   : b.state === 'done'       ? '✓'
                   : '✕';
        row.innerHTML = `<span style="flex-shrink:0">${icon}</span>
          <span class="row-acc">${acc}</span>
          <span class="row-label">${b.label}</span>`;
        if (b.state === 'failed') {
          const btn = document.createElement('button');
          btn.className = 'retry-btn';
          btn.textContent = 'Try Again';
          btn.setAttribute('aria-label', 'Retry submission for ' + acc);
          btn.onclick = () => StatusTracker.retry(acc);
          row.appendChild(btn);
        }
        list.appendChild(row);
      }
    }

    function add(accession) {
      books.set(accession, { state: 'processing', label: 'Querying Gemini...' });
      render();
    }

    function done(accession, title) {
      if (books.has(accession)) {
        books.set(accession, { state: 'done', label: title || 'Saved' });
        render();
      }
    }

    function fail(accession, errMsg) {
      if (books.has(accession)) {
        books.set(accession, { state: 'failed', label: errMsg || 'Unknown error' });
        render();
      }
    }

    function toggleDrawer() {
      const drawer  = document.getElementById('status-drawer');
      const overlay = document.getElementById('drawer-overlay');
      const chevron = document.getElementById('pill-chevron');
      const pill    = document.getElementById('status-pill');
      const isOpen  = drawer.classList.contains('open');
      drawer.classList.toggle('open', !isOpen);
      overlay.classList.toggle('open', !isOpen);
      chevron.classList.toggle('open', !isOpen);
      pill.style.display = isOpen ? 'flex' : 'none';
    }

    function closeDrawer() {
      document.getElementById('status-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('pill-chevron').classList.remove('open');
      if (books.size > 0) document.getElementById('status-pill').style.display = 'flex';
    }

    function dismiss(e) {
      e.stopPropagation();
      document.getElementById('status-pill').style.display = 'none';
      closeDrawer();
      books.clear();
      renderDrawer();
    }

    function retry(accession) {
      books.delete(accession);
      render();
      closeDrawer();
      const accInput = document.getElementById('accession');
      accInput.value = accession;
      accInput.focus();
      accInput.classList.remove('field-highlight');
      // Force reflow so re-adding the class restarts the animation
      void accInput.offsetWidth;
      accInput.classList.add('field-highlight');
      accInput.addEventListener('animationend', () => accInput.classList.remove('field-highlight'), { once: true });
    }

    return { add, done, fail, toggleDrawer, closeDrawer, retry, dismiss };
  })();

  document.getElementById('accession').addEventListener('blur', function () {
    // iOS leaves a scroll offset after keyboard dismisses — reset it
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
  });

  document.getElementById('accession').addEventListener('input', function () {
    this.classList.remove('input-error');
    document.getElementById('accession-error').textContent = '';
  });

  document.getElementById('accession').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); submitBook(); }
  });

  document.addEventListener('DOMContentLoaded', initLibraryScreen);
</script>
</body>
</html>
