<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Book Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f7;
           min-height: 100vh; display: flex; align-items: center;
           justify-content: center; padding: 1rem; }
    .card { background: white; border-radius: 16px; padding: 1.75rem;
            width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .sub { color: #777; font-size: 0.85rem; margin-bottom: 1.25rem; }

    /* Scanner */
    #scanner-section { margin-bottom: 1rem; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden;
              background: #000; position: relative; height: 220px; }
    #reader video { width: 100% !important; height: 100% !important;
                    object-fit: cover; }
    #reader canvas { display: none; }
    .scan-line { position: absolute; left: 10%; right: 10%; height: 2px;
                 background: #4f46e5; top: 50%; transform: translateY(-50%);
                 box-shadow: 0 0 6px #4f46e5; pointer-events: none; }
    .scan-hint { text-align: center; font-size: 0.8rem; color: #888;
                 margin-top: 0.5rem; }

    /* ISBN badge */
    .isbn-badge { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 8px;
                  padding: 0.5rem 0.75rem; font-size: 0.85rem; color: #065f46;
                  margin-bottom: 1rem; display: none; }
    .isbn-badge span { font-weight: 700; }

    /* Form */
    #form-section { display: none; }
    label { display: block; font-size: 0.8rem; font-weight: 600;
            color: #555; margin-bottom: 0.25rem; }
    input[type="text"] { width: 100%; padding: 0.55rem 0.7rem;
                         border: 1.5px solid #e2e8f0; border-radius: 8px;
                         font-size: 0.9rem; margin-bottom: 1rem; }
    input:focus, select:focus { outline: none; border-color: #4f46e5; }
    .price-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .price-row select { padding: 0.55rem 0.5rem; border: 1.5px solid #e2e8f0;
                        border-radius: 8px; font-size: 0.9rem; background: white;
                        cursor: pointer; flex-shrink: 0; }
    .price-row input { margin-bottom: 0; flex: 1; }

    button.primary { width: 100%; padding: 0.85rem; background: #4f46e5; color: white;
                     border: none; border-radius: 10px; font-size: 1rem;
                     font-weight: 600; cursor: pointer; }
    button.primary:disabled { background: #a5b4fc; cursor: not-allowed; }
    button.secondary { width: 100%; padding: 0.65rem; background: white; color: #4f46e5;
                       border: 1.5px solid #4f46e5; border-radius: 10px; font-size: 0.9rem;
                       font-weight: 600; cursor: pointer; margin-top: 0.5rem; }

    #status { margin-top: 1rem; font-size: 0.88rem; text-align: center; color: #555; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ddd;
               border-top-color: #4f46e5; border-radius: 50%;
               animation: spin 0.7s linear infinite; margin-right: 5px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>📚 Library Book Scanner</h1>
  <p class="sub">Point the camera at the barcode on the back cover.</p>

  <div id="scanner-section">
    <div id="reader"><div class="scan-line"></div></div>
    <p class="scan-hint">Align the barcode with the blue line</p>
  </div>

  <div class="isbn-badge" id="isbn-badge">
    📦 ISBN detected: <span id="isbn-display">—</span>
  </div>

  <div id="form-section">
    <label>Accession No. *</label>
    <input type="text" id="accession" placeholder="e.g. LIB-0042">

    <label>Price</label>
    <div class="price-row">
      <select id="currency">
        <option value="₹">₹ INR</option>
        <option value="$">$ USD</option>
        <option value="CA$">CA$ CAD</option>
        <option value="€">€ EUR</option>
      </select>
      <input type="text" id="price" placeholder="e.g. 399">
    </div>

    <button class="primary" id="submitBtn" onclick="submitBook()">📥 Submit Book</button>
    <button class="secondary" onclick="resetScanner()">🔄 Scan Another</button>
  </div>

  <div id="status"></div>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzk__oqXukl9vEB7EEov6uwuzHligIanPtD0-vLK1oTB9TYaMGNINQC44Z3hEOBjG4/exec';

  let detectedISBN = null;
  let lastDetected = null;
  let confirmCount = 0;
  const CONFIRM_THRESHOLD = 3; // require same code detected N times before accepting

  function startScanner() {
    Quagga.init({
      inputStream: {
        type: 'LiveStream',
        target: document.getElementById('reader'),
        constraints: { facingMode: 'environment', width: 1280, height: 720 }
      },
      decoder: {
        readers: ['ean_reader'],
        multiple: false
      },
      locate: true
    }, err => {
      if (err) { setStatus('❌ Camera error: ' + err.message); return; }
      Quagga.start();
    });

    Quagga.onDetected(result => {
      const code = result.codeResult.code;
      if (!code) return;

      // Require the same code detected multiple times to avoid false positives
      if (code === lastDetected) {
        confirmCount++;
      } else {
        lastDetected = code;
        confirmCount = 1;
      }

      if (confirmCount < CONFIRM_THRESHOLD) return;

      const cleaned = code.replace(/-/g, '');
      if (!/^97[89]\d{10}$/.test(cleaned) && !/^\d{10}$/.test(cleaned)) return;

      Quagga.stop();
      detectedISBN = cleaned;
      document.getElementById('isbn-display').textContent = cleaned;
      document.getElementById('isbn-badge').style.display = 'block';
      document.getElementById('scanner-section').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
    });
  }

  async function submitBook() {
    const accession = document.getElementById('accession').value.trim();
    const currency  = document.getElementById('currency').value;
    const priceVal  = document.getElementById('price').value.trim();
    const price     = priceVal ? currency + priceVal : null;
    if (!accession) { setStatus('⚠️ Please enter Accession No.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    setStatus('<span class="spinner"></span> Fetching book details & saving...');

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ isbn: detectedISBN, accessionNo: accession, price }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const result = await res.json();
      if (!result.success) throw new Error(result.error);
      setStatus('✅ "' + result.title + '" saved!');
      setTimeout(resetScanner, 2000);
    } catch (err) {
      setStatus('❌ Error: ' + err.message);
      btn.disabled = false;
    }
  }

  function resetScanner() {
    detectedISBN = null;
    lastDetected = null;
    confirmCount = 0;
    document.getElementById('accession').value = '';
    document.getElementById('price').value = '';
    document.getElementById('currency').selectedIndex = 0;
    document.getElementById('isbn-badge').style.display = 'none';
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('scanner-section').style.display = 'block';
    document.getElementById('status').innerHTML = '';
    document.getElementById('submitBtn').disabled = false;
    startScanner();
  }

  function setStatus(html) { document.getElementById('status').innerHTML = html; }

  startScanner();
</script>
</body>
</html>
